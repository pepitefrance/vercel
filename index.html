<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pépite</title>
<meta name="theme-color" content="#B85C38">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --rust:#B85C38;--rust-d:#8B3E22;--rust-l:#F0D5C4;
  --cream:#FDF6EC;--ink:#2C1810;--ink-m:#7A5C4A;--ink-l:#C4A882;
  --gold:#E8C97A;--white:#FFF;--border:#E8DDD0;--green:#3B7A3E;
}
html,body{height:100%;background:#E8DDD0;font-family:Georgia,serif;}
#app{
  width:100%;max-width:430px;min-height:100dvh;margin:0 auto;
  background:#FDF6EC;position:relative;overflow:hidden;
  display:flex;flex-direction:column;
}
/* HEADER */
#hdr{background:var(--rust);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#logo{font-size:26px;font-style:italic;color:#fff;letter-spacing:-0.5px;}
#logo b{color:var(--gold);font-weight:400;}
#hdr-r{display:flex;gap:8px;}
.hbtn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.18);border:none;cursor:pointer;font-size:18px;color:#fff;display:flex;align-items:center;justify-content:center;position:relative;}
#cn{position:absolute;top:-3px;right:-3px;background:var(--gold);color:var(--rust-d);font-size:9px;font-weight:700;width:15px;height:15px;border-radius:50%;display:none;align-items:center;justify-content:center;}
/* PILLS */
#pills{display:flex;gap:5px;padding:8px 16px 0;flex-shrink:0;}
.pill{font-size:9px;padding:3px 8px;border-radius:3px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;border:1px solid;}
.pe{color:#8B5E0A;border-color:#D4A520;background:#FFF8E0;}
.pv{color:#2D6A2D;border-color:#4A9A4A;background:#E8F5E8;}
.pb{color:var(--ink-m);border-color:var(--border);background:transparent;}
/* PROGRESS */
#pw{height:2px;background:var(--rust-l);flex-shrink:0;margin-top:8px;}
#pb{height:100%;background:var(--rust-d);width:0%;transition:width .3s;}
#ctr{text-align:center;font-size:11px;color:var(--ink-l);padding:5px 0 0;flex-shrink:0;font-family:sans-serif;}
/* DECK */
#deck{position:relative;flex:1;margin:10px 16px 0;min-height:380px;touch-action:none;}
/* POLAROID */
.card{
  position:absolute;width:100%;
  background:#fff;padding:10px 10px 50px;
  border-radius:3px;cursor:grab;
  box-shadow:0 1px 0 #ddd,0 2px 0 #ccc,0 4px 12px rgba(44,24,16,.15);
}
.card:active{cursor:grabbing;}
.cimg{
  width:100%;padding-bottom:72%;position:relative;
  overflow:hidden;border-radius:2px;
}
.cimg-inner{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:72px;
}
.ccap{
  position:absolute;bottom:0;left:10px;right:10px;height:50px;
  display:flex;align-items:center;justify-content:space-between;
}
.ccap-t{font-size:16px;color:var(--ink-m);flex:1;font-style:italic;}
.ccap-p{font-size:20px;font-weight:700;color:var(--rust);font-family:sans-serif;}
/* HINTS */
.hl,.hn{
  position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);
  font-size:22px;font-style:italic;font-weight:700;
  padding:7px 14px;border-radius:3px;border:3px solid;
  opacity:0;pointer-events:none;text-transform:uppercase;letter-spacing:1px;z-index:10;
  white-space:nowrap;
}
.hl{color:var(--green);border-color:var(--green);background:rgba(59,122,62,.09);}
.hn{color:var(--rust);border-color:var(--rust);background:rgba(184,92,56,.09);}
/* BADGE */
.sb{font-size:9px;padding:1px 5px;border-radius:2px;font-weight:700;text-transform:uppercase;border:1px solid;vertical-align:middle;font-family:sans-serif;}
.sbe{background:#FFF8E0;color:#8B5E0A;border-color:#D4A520;}
.sbv{background:#E8F5E8;color:#2D6A2D;border-color:#4A9A4A;}
.sbb{background:#F0EAE0;color:var(--ink-m);border-color:var(--border);}
/* ACTIONS */
#acts{display:flex;justify-content:center;align-items:center;gap:16px;padding:14px 20px;flex-shrink:0;}
.abtn{border:none;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;transition:transform .12s;}
.abtn:hover{transform:scale(1.1);}
.abtn:active{transform:scale(.93);}
.bn{width:54px;height:54px;background:#fff;border:1.5px solid var(--rust);color:var(--rust);}
.bl{width:66px;height:66px;background:var(--rust);color:#fff;border:none;font-size:24px;box-shadow:0 2px 8px rgba(184,92,56,.4);}
.bi{width:42px;height:42px;background:#fff;border:1px solid var(--border);color:var(--ink-m);font-size:17px;}
/* TOAST */
#toast{
  position:absolute;bottom:85px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--ink);color:var(--cream);font-size:13px;padding:8px 18px;
  border-radius:20px;opacity:0;transition:opacity .2s,transform .2s;
  white-space:nowrap;pointer-events:none;z-index:99;font-family:sans-serif;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
/* FIN */
#end{display:none;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:16px;padding:30px;text-align:center;}
#end.on{display:flex;}
/* PANELS */
.panel{position:absolute;inset:0;background:#FDF6EC;z-index:200;display:none;flex-direction:column;}
.panel.on{display:flex;}
.phdr{background:var(--rust);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.phdr-t{font-size:18px;font-style:italic;color:#fff;}
.pclose{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;}
/* PROFILE */
#pb2{flex:1;overflow-y:auto;padding:14px;}
.ps-l{font-size:10px;font-weight:700;color:var(--ink-l);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;font-family:sans-serif;}
.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:18px;}
.tc{background:#fff;border:1px solid var(--border);border-radius:7px;padding:9px 7px;
  display:flex;flex-direction:column;align-items:center;gap:4px;transition:border-color .15s;}
.tc.on{border-color:var(--rust);background:var(--rust-l);}
.te{font-size:22px;}
.tn{font-size:10px;color:var(--ink-m);text-align:center;font-family:sans-serif;}
.tb{height:3px;background:var(--border);border-radius:2px;width:100%;margin-top:2px;}
.tf{height:100%;background:var(--rust);border-radius:2px;transition:width .4s;}
.lg{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.lt{background:#fff;border:1.5px solid var(--border);border-radius:3px;padding:5px 5px 18px;position:relative;}
.lte{font-size:28px;display:flex;align-items:center;justify-content:center;height:56px;background:var(--rust-l);border-radius:2px;}
.ltc{position:absolute;bottom:3px;left:5px;right:5px;font-size:10px;color:var(--ink-m);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-style:italic;}
/* CART */
#cb{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
.ci{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;}
.cie{font-size:30px;}
.cii{flex:1;}
.cin{font-size:13px;color:var(--ink);margin-bottom:2px;font-style:italic;}
.cip{font-size:13px;color:var(--rust);font-weight:700;font-family:sans-serif;}
.cis{font-size:10px;color:var(--ink-l);margin-top:2px;font-family:sans-serif;}
.crm{background:none;border:none;color:var(--ink-l);font-size:20px;cursor:pointer;padding:4px;line-height:1;}
#cf{padding:14px 16px;border-top:1px solid var(--border);background:#fff;flex-shrink:0;}
#ct{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
#ctl{font-size:13px;color:var(--ink-m);font-family:sans-serif;}
#cta{font-size:22px;color:var(--ink);}
#cn2{font-size:11px;color:var(--ink-l);margin-bottom:10px;font-family:sans-serif;line-height:1.5;}
#bco{width:100%;background:var(--rust);color:#fff;border:none;padding:14px;border-radius:8px;font-size:15px;cursor:pointer;font-family:sans-serif;font-weight:500;}
</style>
</head>

</div>

var CATS=[{key:"luminaire",n:"Luminaires",e:"💡"},{key:"vaisselle",n:"Vaisselle",e:"🫖"},{key:"mode",n:"Mode",e:"🧥"},{key:"deco",n:"Décoration",e:"🪞"},{key:"photo",n:"Photo",e:"📷"},{key:"mobilier",n:"Mobilier",e:"🪑"},{key:"papier",n:"Éphémères",e:"📬"},{key:"hifi",n:"Hifi",e:"🎵"},{key:"art",n:"Art",e:"🖼️"},{key:"cuisine",n:"Cuisine",e:"☕"},{key:"bijoux",n:"Bijoux",e:"💍"},{key:"jouets",n:"Jouets",e:"🎠"}];
var idx=0,cart=[],liked=[],taste={},dragging=false,sx=0,curX=0,activeCard=null;

function srcBadge(s){
  var m={ebay:"eBay",vinted:"Vinted",broc:"Vide-grenier"};
  var c={ebay:"sbe",vinted:"sbv",broc:"sbb"};
  return '<span class="sb '+c[s]+'">'+m[s]+'</span>';
}

function renderDeck(){
  var deck=document.getElementById('deck');
  var end=document.getElementById('end');
  // remove all cards
  var cards=deck.querySelectorAll('.card');
  cards.forEach(function(c){c.remove();});

  if(idx>=ITEMS.length){
    end.classList.add('on');
    document.getElementById('pb').style.width='100%';
    document.getElementById('ctr').textContent='';
    return;
  }
  end.classList.remove('on');

  var max=Math.min(idx+2,ITEMS.length-1);
  for(var i=max;i>=idx;i--){
    var item=ITEMS[i];
    var off=i-idx;
    var card=document.createElement('div');
    card.className='card';
    card.id='card'+i;
    var rot=item.rot+off*1.8;
    var sc=1-off*0.032;
    var ty=off*7;
    card.style.transform='rotate('+rot+'deg) scale('+sc+') translateY('+ty+'px)';
    card.style.zIndex=10-off;
    if(off>0) card.style.opacity='0.72';
    card.innerHTML=
      '<div class="hl" id="hl'+i+'">Pépite !</div>'+
      '<div class="hn" id="hn'+i+'">Jamais vu</div>'+
      '<div class="cimg"><div class="cimg-inner" style="background:'+item.bg+'">'+item.emoji+'</div></div>'+
      '<div class="ccap">'+
        '<div class="ccap-t">'+item.caption+' '+srcBadge(item.src)+'</div>'+
        '<div class="ccap-p">'+item.price+' €</div>'+
      '</div>';
    if(i===idx) attachDrag(card);
    deck.appendChild(card);
  }
  document.getElementById('pb').style.width=Math.round(idx/ITEMS.length*100)+'%';
  document.getElementById('ctr').textContent=(idx+1)+' / '+ITEMS.length;
}

function attachDrag(card){
  activeCard=card;
  function getX(e){return e.touches?e.touches[0].clientX:e.clientX;}
  card.addEventListener('mousedown',function(e){dragging=true;sx=getX(e);curX=0;card.style.transition='none';});
  card.addEventListener('touchstart',function(e){dragging=true;sx=getX(e);curX=0;card.style.transition='none';},{passive:true});
  document.addEventListener('mousemove',onMove);
  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('mouseup',onEnd);
  document.addEventListener('touchend',onEnd);
  function onMove(e){
    if(!dragging)return;
    if(e.cancelable)e.preventDefault();
    curX=getX(e)-sx;
    var rot=ITEMS[idx].rot+curX*0.07;
    var sc=1-Math.abs(curX)*0.0004;
    card.style.transform='rotate('+rot+'deg) scale('+sc+') translateX('+curX+'px)';
    var hl=document.getElementById('hl'+idx);
    var hn=document.getElementById('hn'+idx);
    if(hl&&hn){
      if(curX>40){hl.style.opacity=Math.min((curX-40)/70,1);hn.style.opacity=0;}
      else if(curX<-40){hn.style.opacity=Math.min((-curX-40)/70,1);hl.style.opacity=0;}
      else{hl.style.opacity=0;hn.style.opacity=0;}
    }
  }
  function onEnd(){
    if(!dragging)return;
    dragging=false;
    card.style.transition='transform .3s ease, opacity .3s';
    if(curX>80){flyOut(card,1);}
    else if(curX<-80){flyOut(card,-1);}
    else{card.style.transform='rotate('+ITEMS[idx].rot+'deg)';}
    curX=0;
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('touchmove',onMove);
    document.removeEventListener('mouseup',onEnd);
    document.removeEventListener('touchend',onEnd);
  }
}

function flyOut(card,dir){
  card.style.transform='rotate('+(dir*22)+'deg) translateX('+(dir*550)+'px)';
  card.style.opacity='0';
  setTimeout(function(){if(dir===1)confirmLike();else confirmNope();},220);
}

function confirmLike(){
  var item=ITEMS[idx];
  if(!cart.find(function(c){return c.id===item.id;}))cart.push(item);
  liked.push(item.id);
  taste[item.cat]=(taste[item.cat]||0)+1;
  showToast('✦ Ajoutée au panier !');
  updateBadge();
  idx++;setTimeout(renderDeck,160);
}
function confirmNope(){
  showToast('Disparue pour toujours.');
  idx++;setTimeout(renderDeck,160);
}
function doLike(){var c=document.getElementById('card'+idx);if(c)flyOut(c,1);}
function doNope(){var c=document.getElementById('card'+idx);if(c)flyOut(c,-1);}
function showInfo(){if(idx<ITEMS.length)showToast(ITEMS[idx].name+' · '+ITEMS[idx].loc);}
function doPin(){if(idx<ITEMS.length)showToast('📍 '+ITEMS[idx].loc+' · '+ITEMS[idx].tags.join(', '));}
function restart(){idx=0;renderDeck();}

function updateBadge(){
  var n=document.getElementById('cartn');
  if(cart.length>0){n.style.display='flex';n.textContent=cart.length;}
  else n.style.display='none';
}
var toastT;
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  clearTimeout(toastT);
  toastT=setTimeout(function(){t.classList.remove('on');},2200);
}
function openProfile(){renderProfile();document.getElementById('pp').classList.add('on');}
function closeProfile(){document.getElementById('pp').classList.remove('on');}
function renderProfile(){
  var body=document.getElementById('pb2');
  var max=Math.max(1,Math.max.apply(null,Object.values(taste).concat([0])));
  var likedItems=ITEMS.filter(function(i){return liked.indexOf(i.id)>-1;});
  var html='<div style="margin-bottom:16px;"><div class="ps-l">Ce que tu aimes</div><div class="tg">';
  CATS.forEach(function(tc){
    var score=taste[tc.key]||0;
    var pct=Math.round(score/max*100);
    html+='<div class="tc'+(score>0?' on':'')+'"><div class="te">'+tc.e+'</div><div class="tn">'+tc.n+'</div><div class="tb"><div class="tf" style="width:'+pct+'%"></div></div></div>';
  });
  html+='</div></div>';
  if(likedItems.length>0){
    html+='<div class="ps-l">Tes pépites ('+likedItems.length+')</div><div class="lg">';
    likedItems.forEach(function(i){
      html+='<div class="lt"><div class="lte">'+i.emoji+'</div><div class="ltc">'+i.caption+'</div></div>';
    });
    html+='</div>';
  } else {
    html+='<div style="text-align:center;padding:30px 20px;color:#C4A882;font-style:italic;">Like quelques pépites<br>pour voir ton profil.</div>';
  }
  body.innerHTML=html;
}
function openCart(){renderCart();document.getElementById('cp').classList.add('on');}
function closeCart(){document.getElementById('cp').classList.remove('on');}
function renderCart(){
  var body=document.getElementById('cb');
  if(cart.length===0){
    body.innerHTML='<div style="text-align:center;padding:50px 20px;color:#C4A882;"><div style="font-size:44px;margin-bottom:14px;">🛍</div><div style="font-style:italic;font-size:16px;">Ton panier est vide.</div></div>';
    document.getElementById('cta').textContent='0 €';
    return;
  }
  var html='';
  cart.forEach(function(i){
    html+='<div class="ci"><div class="cie">'+i.emoji+'</div><div class="cii"><div class="cin">'+i.name+'</div><div class="cip">'+i.price+' €</div><div class="cis">'+i.loc+'</div></div><button class="crm" onclick="removeCart('+i.id+')">✕</button></div>';
  });
  body.innerHTML=html;
  var tot=cart.reduce(function(s,i){return s+i.price;},0);
  document.getElementById('cta').textContent=tot+' €';
}
function removeCart(id){
  cart=cart.filter(function(i){return i.id!==id;});
  updateBadge();renderCart();showToast('Retirée du panier.');
}
function checkout(){
  if(!cart.length){showToast('Ton panier est vide !');return;}
  showToast('🎉 '+cart.length+' pépite'+(cart.length>1?'s':'')+' confirmée'+(cart.length>1?'s':'')+'!');
  cart=[];updateBadge();closeCart();
}
renderDeck();
</script>
